<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitam Super Market</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>🛒 Mitam Super Market</h2>
<input type="text" id="search" placeholder="Search product..." onkeyup="searchProduct()">
</header>

<div class="filters">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('snacks')">Snacks</button>
<button onclick="filterCategory('drinks')">Drinks</button>
<button onclick="filterCategory('grocery')">Grocery</button>
</div>

<div id="products" class="products"></div>

<div class="cart">
<h3>Cart (<span id="count">0</span>)</h3>
<div id="cartItems"></div>
<p>Total: ₹<span id="total">0</span></p>

<button onclick="order()">Order on WhatsApp</button>
<button onclick="clearCart()">Clear Cart</button>
</div>

<script src="products.js"></script>
<script src="script.js"></script>

</body>
</html>
